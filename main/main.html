    <script>
// Mainly just copy and pasted from google maps official site 
		function getLocation() {
  			if (navigator.geolocation) {
    			navigator.geolocation.getCurrentPosition(showPosition, showError);
  				}

}
      let map;
      let marker;
// shul names 
      var locations = {
        
        
		  KMS: {
          name: "Kemp Mill Synagogue",
          lat: 39.0518,
          lng: -77.0252
        }
      };
      function initMap() {
        const firstLocation = locations.KMS;
        const firstCoords = { lat: firstLocation.lat, lng: firstLocation.lng };
        //sets input value
        map = new google.maps.Map(document.getElementById("map"), {
          center: firstCoords,
          zoom: 100
        });
        marker = new google.maps.Marker({
          position: firstCoords,
          map: map,
          title: firstLocation.name
        });
        populateAllLocations();
        document.getElementById("locationTitle").textContent = firstLocation.name;
      }
    //initialization
      function populateAllLocations() {
        const select = document.getElementById("locationSelect");
        select.innerHTML = "";
        for (const key in locations) {
          const option = document.createElement("option");
          option.value = key;
          option.textContent = locations[key].name;
          select.appendChild(option);
        }
      }

      function goToSelectedLocation() {
        const selectedKey = document.getElementById("locationSelect").value;
        if (!selectedKey || !locations[selectedKey]) {
          return;
        }
        //gets selected option, and isolates the name
        selected = locationSelect.options[locationSelect.selectedIndex].innerHTML.split("(")[0].trim();
        for(let i = 0; i < locations.length; i++){
          if(locations[i].name === selected){
          const selectedLocation = locations[i];
        const coords = { lat: Number(selectedLocation.lat), lng: Number(selectedLocation.lng)};
        document.getElementById("locationTitle").textContent = selectedLocation.name;
        map.setCenter(coords);
        map.setZoom(20);
        marker.setPosition(coords);
        marker.setTitle(selectedLocation.name);
      }
      }
      }
// filters via radius 
      function filterLocations() {
        const radius = Number(document.getElementById("radius").value);
        const userLng = Number(document.getElementById("longi").value);
        const userLat = Number(document.getElementById("latti").value);
// warning to put in an input 
        if (isNaN(radius) || isNaN(userLng) || isNaN(userLat) || (userLat<0.000001 && -userLat<0.000001) || (userLng<0.000001 && -userLng<0.000001) || (radius<0.000001 && -radius<0.000001)) {
          alert("Please enter valid numbers for radius, longitude, and latitude.");
          return;
        }
        const select = document.getElementById("locationSelect");
        select.innerHTML = "";
        let foundAny = false;
        let firstMatchKey = null;
        for (const key in locations) {
          const loc = locations[key];
          const distance = getDistanceMiles(userLat, userLng, loc.lat, loc.lng);
// Finding Distance 
          if (distance <= radius) {
            const option = document.createElement("option");
            option.value = key;
            option.textContent = loc.name + " (" + distance.toFixed(2) + " miles)";
            select.appendChild(option);

            if (!firstMatchKey) {
              firstMatchKey = key;
            }

            foundAny = true;
          }
        }

        if (!foundAny) {
          const option = document.createElement("option");
          option.textContent = "No locations found in that radius";
          option.disabled = true;
          option.selected = true;
          select.appendChild(option);
// setting position 
          document.getElementById("locationTitle").textContent = "No matching locations";
          map.setCenter({ lat: userLat, lng: userLng });
          map.setZoom(10);
          marker.setPosition({ lat: userLat, lng: userLng });
          marker.setTitle("Your coordinates");
          return;
        }

        select.value = firstMatchKey;
        goToSelectedLocation();
      }

//filters by name 
      function filterLocationsSearch() {
        const radius = Number(document.getElementById("radius").value);
        const userLng = Number(document.getElementById("longi").value);
        const userLat = Number(document.getElementById("latti").value);
		const userSearch = document.getElementById("search").value;
        const select = document.getElementById("locationSelect");
        select.innerHTML = "";
        let foundAny = false;
        let firstMatchKey = null;
        for (const key in locations) {
          const loc = locations[key];
          const distance = getDistanceMiles(userLat, userLng, loc.lat, loc.lng);
          if (loc.name.includes(userSearch)) {
            const option = document.createElement("option");
            option.value = key;
            option.textContent = loc.name;
            select.appendChild(option);
            if (!firstMatchKey) {
              firstMatchKey = key;
            }

            foundAny = true;
          }
        }
        if (!foundAny) {
          const option = document.createElement("option");
          option.textContent = "No locations by that name";
          option.disabled = true;
          option.selected = true;
          select.appendChild(option);
          document.getElementById("locationTitle").textContent = "No matching locations";
          map.setCenter({ lat: userLat, lng: userLng });
          map.setZoom(10);
          marker.setPosition({ lat: userLat, lng: userLng });
          marker.setTitle("Your coordinates");
          return;
        }
        select.value = firstMatchKey;
        goToSelectedLocation();
      }
	function getDistanceMiles(lat1, lon1, lat2, lon2) {
   	 	dLat = Math.PI*(lat1- lat2)/180;
		dLon = Math.PI*(lon1 - lon2)/180;
  		let x = dLon*dLon+dLat*dLat;
  		let distance = Math.sqrt(x);
		return distance*3958.8;
		}

    <script>
      //uploads reviews
    function loadReviews(){
      var h = '';
      let average_el = 0;
      let average_wc = 0;
      let average_ee = 0;
      for(let i = 0; i < locations[locationSelect.selectedIndex].reviews.length; i++){
        k = locations[locationSelect.selectedIndex].reviews[i];
        h+=(`<div class="review"><div class="text">${k.text}</div><div class="ratings">WheelChair Access: ${k.ratings.Wheelchair_access}<br> Shabbat Elevator: ${k.ratings.Shabbat_Elevator}<br>Entrance/Exit: ${k.ratings.Entrance_Exit}</div><div class="author">${k.author}</div></div>`)
        average_el += Number(k.ratings.Shabbat_Elevator);
        average_ee += Number(k.ratings.Entrance_Exit);
        average_wc += Number(k.ratings.Wheelchair_access);
      }
      ee.innerText = "Average Entrance/Exit Rating: " + (average_ee / locations[locationSelect.selectedIndex].reviews.length) + "/5";
      wca.innerText = "Average Entrance/Exit Rating: " + (average_wc / locations[locationSelect.selectedIndex].reviews.length) + "/5";
      se.innerText = "Average Entrance/Exit Rating: " + (average_el / locations[locationSelect.selectedIndex].reviews.length) + "/5";
      categoryRatings.style.display = 'block';
      rvs.innerHTML = h;
    }
        // Get the <p> element by its ID
        const x = document.getElementById("demo");
        function getLocation() {
            // Check if the browser supports the Geolocation API
            if (navigator.geolocation) {
                // If supported, request the current position and specify callback functions
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            } else {
                // If not supported, display an error message
                x.innerHTML = "Geolocation is not supported by this browser.";
            }
        }
        // Success callback function to display the coordinates
        function showPosition(position) {
            longi.value = Math.round(Number(position.coords.longitude*1000))/1000;
            latti.value = Math.round(Number(position.coords.latitude*1000))/1000;
            // You can also access other data like accuracy, altitude, speed, etc.
        }
        // Error callback function to handle issues (e.g., user denial, timeout)
        function showError(error) {
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    x.innerHTML = "User denied the request for Geolocation."
                    break;
                case error.POSITION_UNAVAILABLE:
                    x.innerHTML = "Location information is unavailable."
                    break;
                case error.TIMEOUT:
                    x.innerHTML = "The request to get user location timed out."
                    break;
                case error.UNKNOWN_ERROR:
                    x.innerHTML = "An unknown error occurred."
                    break;
            }
        }
// reviews
    </script>

<script>
//processes search results
  function processData(a){
    locations = a;
  }
//gets search results
  async function search(query){
    let x = await fetch('/search',{
      'method':"POST",
      body:JSON.stringify({string:query}),
      headers:{
        'Content-type':'application/json'
      }
    })
    let res = await x.json();
    processData(res.results);
  return res;
  }
</script>
