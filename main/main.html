<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Let's Find Us a Shul</title>
    <style>
      #locationTitle {
        font-size: 24px;
        font-weight: bold;
        margin-bottom: 10px;
      }

      #controls {
        margin-bottom: 10px;
      }

      #map {
        width: 100%;
        height: 500px;
      }

      label {
        margin-right: 6px;
      }

      input {
        margin-right: 12px;
      }

      button {
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <label for="radius">Radius (miles):</label>
    <input type="number" id="radius" name="radius" step="any">

    <label for="longi">Your Longitude:</label>
    <input type="number" id="longi" name="longi" step="any">

    <label for="latti">Your Latitude:</label>
    <input type="number" id="latti" name="latti" step="any">

    <button onclick="filterLocations()">Filter Locations</button>


	<label for="search">Search:</label >
    <input type="text" id="search" name="search" step="any">
			
	<button onclick="filterLocationsSearch()">Enter</button>

    <div id="controls">
      <select id="locationSelect" onchange="goToSelectedLocation()"></select>
    </div>

    <div id="locationTitle"></div>
    <div id="map"></div>

    <script>

		function getLocation() {
  			if (navigator.geolocation) {
    			navigator.geolocation.getCurrentPosition(showPosition, showError);
  				}
}
      let map;
      let marker;

      const locations = {
        dc: {
          name: "Washington, DC",
          lat: 38.9072,
          lng: -77.0369
        },
        baltimore: {
          name: "Baltimore",
          lat: 39.2904,
          lng: -76.6122
        },
        nyc: {
          name: "New York City",
          lat: 40.7128,
          lng: -74.0060
        }
      };

      function initMap() {
        const firstLocation = locations.dc;
        const firstCoords = { lat: firstLocation.lat, lng: firstLocation.lng };

        map = new google.maps.Map(document.getElementById("map"), {
          center: firstCoords,
          zoom: 100
        });

        marker = new google.maps.Marker({
          position: firstCoords,
          map: map,
          title: firstLocation.name
        });

        populateAllLocations();
        document.getElementById("locationTitle").textContent = firstLocation.name;
      }

      function populateAllLocations() {
        const select = document.getElementById("locationSelect");
        select.innerHTML = "";

        for (const key in locations) {
          const option = document.createElement("option");
          option.value = key;
          option.textContent = locations[key].name;
          select.appendChild(option);
        }
      }

      function goToSelectedLocation() {
        const selectedKey = document.getElementById("locationSelect").value;
        if (!selectedKey || !locations[selectedKey]) {
          return;
        }

        const selectedLocation = locations[selectedKey];
        const coords = { lat: selectedLocation.lat, lng: selectedLocation.lng };

        document.getElementById("locationTitle").textContent = selectedLocation.name;
        map.setCenter(coords);
        map.setZoom(10);
        marker.setPosition(coords);
        marker.setTitle(selectedLocation.name);
      }

      function filterLocations() {
        const radius = Number(document.getElementById("radius").value);
        const userLng = Number(document.getElementById("longi").value);
        const userLat = Number(document.getElementById("latti").value);

        if (isNaN(radius) || isNaN(userLng) || isNaN(userLat) || (userLat<0.000001 && -userLat<0.000001) || (userLng<0.000001 && -userLng<0.000001) || (radius<0.000001 && -radius<0.000001)) {
          alert("Please enter valid numbers for radius, longitude, and latitude.");
          return;
        }

        const select = document.getElementById("locationSelect");
        select.innerHTML = "";

        let foundAny = false;
        let firstMatchKey = null;

        for (const key in locations) {
          const loc = locations[key];
          const distance = getDistanceMiles(userLat, userLng, loc.lat, loc.lng);

          if (distance <= radius) {
            const option = document.createElement("option");
            option.value = key;
            option.textContent = loc.name + " (" + distance.toFixed(2) + " miles)";
            select.appendChild(option);

            if (!firstMatchKey) {
              firstMatchKey = key;
            }

            foundAny = true;
          }
        }

        if (!foundAny) {
          const option = document.createElement("option");
          option.textContent = "No locations found in that radius";
          option.disabled = true;
          option.selected = true;
          select.appendChild(option);

          document.getElementById("locationTitle").textContent = "No matching locations";
          map.setCenter({ lat: userLat, lng: userLng });
          map.setZoom(10);
          marker.setPosition({ lat: userLat, lng: userLng });
          marker.setTitle("Your coordinates");
          return;
        }

        select.value = firstMatchKey;
        goToSelectedLocation();
      }
      function filterLocationsSearch() {
        const radius = Number(document.getElementById("radius").value);
        const userLng = Number(document.getElementById("longi").value);
        const userLat = Number(document.getElementById("latti").value);
		const userSearch = document.getElementById("search").value;
        

        const select = document.getElementById("locationSelect");
        select.innerHTML = "";

        let foundAny = false;
        let firstMatchKey = null;

        for (const key in locations) {
          const loc = locations[key];
          const distance = getDistanceMiles(userLat, userLng, loc.lat, loc.lng);

          if (loc.name.includes(userSearch)) {
            const option = document.createElement("option");
            option.value = key;
            option.textContent = loc.name;
            select.appendChild(option);

            if (!firstMatchKey) {
              firstMatchKey = key;
            }

            foundAny = true;
          }
        }

        if (!foundAny) {
          const option = document.createElement("option");
          option.textContent = "No locations by that name";
          option.disabled = true;
          option.selected = true;
          select.appendChild(option);

          document.getElementById("locationTitle").textContent = "No matching locations";
          map.setCenter({ lat: userLat, lng: userLng });
          map.setZoom(10);
          marker.setPosition({ lat: userLat, lng: userLng });
          marker.setTitle("Your coordinates");
          return;
        }

        select.value = firstMatchKey;
        goToSelectedLocation();
      }
	function getDistanceMiles(lat1, lon1, lat2, lon2) {
   	 	dLat = Math.PI*(lat1- lat2)/180;
		dLon = Math.PI*(lon1 - lon2)/180;

  		let x = dLon*dLon+dLat*dLat;
  		let distance = Math.sqrt(x);
		return distance*3958.8;
		}


    </script>

    <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDQ-MrK7fe_b0tUTyAsIlJ0UspZfxOJ_mc&loading=async&callback=initMap&v=weekly"
      async
    ></script>

	    <h2>User Location</h2>
    <p>Click the button to get your coordinates (latitude and longitude):</p>
    
    <!-- The button that triggers the location request -->
    <button onclick="getLocation()">Get Location</button>
    
    <!-- The paragraph element where the coordinates will be displayed -->
    <p id="demo">Geolocation is not supported by this browser.</p>

    <!-- JavaScript code using the Geolocation API -->
    <script>
        // Get the <p> element by its ID
        const x = document.getElementById("demo");

        function getLocation() {
            // Check if the browser supports the Geolocation API
            if (navigator.geolocation) {
                // If supported, request the current position and specify callback functions
                navigator.geolocation.getCurrentPosition(showPosition, showError);
            } else {
                // If not supported, display an error message
                x.innerHTML = "Geolocation is not supported by this browser.";
            }
        }

        // Success callback function to display the coordinates
        function showPosition(position) {
            x.innerHTML = "Latitude: " + position.coords.latitude + 
            "<br>Longitude: " + position.coords.longitude;
            // You can also access other data like accuracy, altitude, speed, etc.
        }

        // Error callback function to handle issues (e.g., user denial, timeout)
        function showError(error) {
            switch(error.code) {
                case error.PERMISSION_DENIED:
                    x.innerHTML = "User denied the request for Geolocation."
                    break;
                case error.POSITION_UNAVAILABLE:
                    x.innerHTML = "Location information is unavailable."
                    break;
                case error.TIMEOUT:
                    x.innerHTML = "The request to get user location timed out."
                    break;
                case error.UNKNOWN_ERROR:
                    x.innerHTML = "An unknown error occurred."
                    break;
            }
        }

    </script>

    <p>Ramps: <span id="ramps"></span>/5</p>

	<p>Elevators: <span id="elevators"></span>/5</p>

	<p>Sensory Friendly: <span id="sensory"></span>/5</p>

	<p>Hard-of-Sight Friendly: <span id="sight"></span>/5</p>

	<p>Hard-of-Hearing Friendly: <span id="hearing"></span>/5</p>
	</body>

<script>
  const categoryToId = {
    "Ramps": "ramps",
    "Elevators": "elevators",
    "Sensory Friendly": "sensory",
    "Hard-of-Sight Friendly": "sight",
    "Hard-of-Hearing Friendly": "hearing"
  };

  function fillAverageRatingsForShul(data, shulName) {
    const shul = data.shuls.find(s => s.name === shulName);
    if (!shul) return;

    const totals = {};
    const counts = {};

    for (const review of shul.reviews || []) {
      if (typeof review.rating !== "number" || !review.category) continue;

      if (!(review.category in totals)) {
        totals[review.category] = 0;
        counts[review.category] = 0;
      }

      totals[review.category] += review.rating;
      counts[review.category] += 1;
    }

    for (const category in categoryToId) {
      const id = categoryToId[category];
      const element = document.getElementById(id);

      if (!element) continue;

      if (counts[category]) {
        element.textContent = (totals[category] / counts[category]).toFixed(1);
      } else {
        element.textContent = "No ratings";
      }
    }
  }

  async function loadAndFillRatings() {
    const response = await fetch("/reviews.json",{'method':'POST'});
    const data = await response.json();
	const selectedKey = document.getElementById("locationSelect").value;
	const selectedLocation = locations[selectedKey];
	OurShulsName = selectedLocation.name
    fillAverageRatingsForShul(data, "OurShulsName);
  }

  loadAndFillRatings();
</script>
